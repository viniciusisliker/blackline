<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <title>Portal do Cliente — BlackLine Studio Automotivo</title>
  <meta name="description" content="Consulte a garantia do seu veículo pela placa — BlackLine Studio Automotivo." />
  <link rel="canonical" href="https://viniciusisliker.github.io/blackline/site/portal.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png?v=3" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png?v=3" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg?v=3" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png?v=3" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/blackline-site.css" />
  <link rel="stylesheet" href="css/blackline-motion.css" />
</head>
<body data-page="portal">
  <div id="bl-navbar"></div>
  <main class="bl-page bl-portal">
    <section class="bl-section" style="padding-top:calc(var(--bl-nav-h) + var(--bl-safe-top) + 2rem)">
      <div class="bl-container bl-portal__wrap bl-reveal is-visible">
        <img src="img/logo-blackline.png" alt="BlackLine Studio Automotivo" class="bl-portal__logo" width="200" height="60" />
        <h1 class="bl-display" style="font-size:clamp(1.5rem,4vw,2.25rem);margin-top:1rem">Portal do <span>cliente</span></h1>
        <p class="bl-lead" style="margin-inline:auto;text-align:center">Consulte a garantia do seu veículo pela placa.</p>

        <form id="bl-portal-form" class="bl-portal__form">
          <label class="bl-portal__label" for="bl-portal-placa">Placa do veículo</label>
          <input id="bl-portal-placa" type="text" placeholder="ABC1D23" maxlength="8" required />
          <p id="bl-portal-error" class="bl-portal__error" hidden></p>
          <button type="submit" class="bl-btn bl-btn--gold" style="width:100%">Consultar garantia</button>
        </form>

        <p class="bl-portal__hint">Demo: ABC1D23 ou JKL7M89</p>
        <div id="bl-portal-result" class="bl-portal__result" hidden></div>
        <a href="index.html" class="bl-portal__back">← Voltar ao site</a>
      </div>
    </section>
  </main>
  <div id="bl-footer"></div>
  <script src="js/seo.js" defer></script>
  <script src="js/site.js" defer></script>
  <script src="js/blackline.js" defer></script>
  <script src="js/blackline-motion.js" defer></script>
  <script src="js/portal.js" defer></script>
  <script src="components.js" defer></script>
</body>
</html>
