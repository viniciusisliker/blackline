<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <title>Galeria — BlackLine Studio Automotivo</title>
  <meta name="description" content="Galeria de instalações BlackLine: películas térmicas, PPF, antivandalismo e proteção de vidros em São Paulo." />
  <link rel="canonical" href="https://viniciusisliker.github.io/blackline/site/galeria.html" />
  <meta property="og:site_name" content="BlackLine Studio Automotivo" />
  <meta property="og:title" content="Galeria — BlackLine" />
  <meta property="og:description" content="Resultados reais de proteção automotiva premium." />
  <meta property="og:url" content="https://viniciusisliker.github.io/blackline/site/galeria.html" />
  <meta property="og:image" content="https://viniciusisliker.github.io/blackline/site/img/hero.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png?v=2" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png?v=2" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/blackline-site.css" />
  <link rel="stylesheet" href="css/blackline-motion.css" />
</head>
<body class="bl-grain" data-page="galeria">
  <div id="bl-navbar"></div>
  <main class="bl-page">
    <header class="bl-page-hero bl-page-hero--short">
      <div class="bl-page-hero__bg">
        <img src="img/hero.png" alt="" width="1920" height="1080" decoding="async" loading="eager" />
        <div class="bl-page-hero__fade"></div>
      </div>
      <div class="bl-container bl-reveal is-visible">
        <p class="bl-eyebrow">Resultados</p>
        <h1 class="bl-display">Galeria <span>BlackLine</span></h1>
        <p class="bl-lead">Acabamento de showroom — películas, PPF e blindagem com precisão milimétrica.</p>
      </div>
    </header>

    <section class="bl-section">
      <div class="bl-container">
        <div class="bl-gallery" data-stagger>
          <figure class="bl-gallery__item bl-reveal">
            <div class="bl-ba" data-ba>
              <img src="img/hero.png" alt="Antes — sem película" class="bl-ba__before" loading="lazy" decoding="async" />
              <img src="img/produtos-banner.png" alt="Depois — com proteção BlackLine" class="bl-ba__after" loading="lazy" decoding="async" />
              <input type="range" class="bl-ba__slider" min="0" max="100" value="50" aria-label="Comparar antes e depois" />
              <span class="bl-ba__label bl-ba__label--before">Antes</span>
              <span class="bl-ba__label bl-ba__label--after">Depois</span>
            </div>
            <figcaption>Película térmica Ceramic BLACK — conforto e estética</figcaption>
          </figure>
          <figure class="bl-gallery__item bl-reveal">
            <img src="img/produtos-banner.png" alt="PPF capô e frontal" loading="lazy" decoding="async" />
            <figcaption>PPF frontal — proteção contra detritos</figcaption>
          </figure>
          <figure class="bl-gallery__item bl-reveal">
            <img src="img/hero.png" alt="Instalação antivandalismo" loading="lazy" decoding="async" />
            <figcaption>Antivandalismo Ps8 — segurança invisível</figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>
  <div id="bl-footer"></div>
  <script src="js/seo.js" defer></script>
  <script src="js/site.js" defer></script>
  <script src="js/blackline.js" defer></script>
  <script src="js/blackline-motion.js" defer></script>
  <script src="components.js" defer></script>
</body>
</html>
